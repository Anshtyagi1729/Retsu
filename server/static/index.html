<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>retsu</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: #0b0b0c;
    color: #e4e4e4;
    padding: 3rem 1.5rem;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin: 0 0 2rem;
    color: #8b8b8b;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: #1c1c1e;
    border: 1px solid #1c1c1e;
    margin-bottom: 2.5rem;
  }
  .stat {
    background: #0b0b0c;
    padding: 1.25rem 1rem;
    text-align: center;
  }
  .stat .n {
    font-size: 1.8rem;
    font-weight: 600;
  }
  .stat .l {
    font-size: 0.7rem;
    color: #8b8b8b;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 0.25rem;
  }
  #dlq.nonzero .n { color: #ff5c5c; }
  #retry.nonzero .n { color: #e8b339; }

  .lookup {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  input {
    flex: 1;
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #e4e4e4;
    padding: 0.6rem 0.7rem;
    font: inherit;
    border-radius: 4px;
  }
  input:focus { outline: 1px solid #4a4a4a; }
  button {
    background: #1c1c1e;
    border: 1px solid #2a2a2a;
    color: #e4e4e4;
    padding: 0.6rem 1rem;
    font: inherit;
    cursor: pointer;
    border-radius: 4px;
  }
  button:hover { background: #242426; }

  pre {
    background: #111;
    border: 1px solid #1c1c1e;
    border-radius: 4px;
    padding: 1rem;
    font-size: 0.8rem;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    min-height: 2.5rem;
    color: #b8b8b8;
  }
  .status-pending, .status-in_flight { color: #e8b339; }
  .status-succeeded { color: #4ade80; }
  .status-failed { color: #f59e0b; }
  .status-dead { color: #ff5c5c; }
</style>
</head>
<body>
<main>
  <h1>retsu</h1>

  <div class="stats">
    <div class="stat" id="pending"><div class="n">-</div><div class="l">pending</div></div>
    <div class="stat" id="inflight"><div class="n">-</div><div class="l">inflight</div></div>
    <div class="stat" id="retry"><div class="n">-</div><div class="l">retry</div></div>
    <div class="stat" id="dlq"><div class="n">-</div><div class="l">dlq</div></div>
  </div>

  <div class="lookup">
    <input id="jobId" placeholder="job id" autocomplete="off">
    <button id="lookupBtn">lookup</button>
  </div>
  <pre id="jobResult">&nbsp;</pre>
</main>

<script>
async function refreshStats() {
  try {
    const res = await fetch('/stats');
    const s = await res.json();
    for (const key of ['pending', 'inflight', 'retry', 'dlq']) {
      const el = document.getElementById(key);
      el.querySelector('.n').textContent = s[key];
      el.classList.toggle('nonzero', s[key] > 0);
    }
  } catch (e) {
    // server's down or unreachable - leave last known values on screen
  }
}

async function lookupJob() {
  const id = document.getElementById('jobId').value.trim();
  const out = document.getElementById('jobResult');
  if (!id) { out.textContent = ' '; return; }
  try {
    const res = await fetch('/jobs/' + encodeURIComponent(id));
    if (res.status === 404) { out.textContent = 'not found'; return; }
    const j = await res.json();
    out.innerHTML = '<span class="status-' + j.status + '">' + j.status + '</span>  attempts ' +
      j.attempts + '/' + j.max_attempts + (j.last_error ? '\n' + j.last_error : '') +
      '\n\n' + JSON.stringify(j, null, 2);
  } catch (e) {
    out.textContent = 'lookup failed';
  }
}

document.getElementById('lookupBtn').addEventListener('click', lookupJob);
document.getElementById('jobId').addEventListener('keydown', e => { if (e.key === 'Enter') lookupJob(); });

refreshStats();
setInterval(refreshStats, 1000);
</script>
</body>
</html>
